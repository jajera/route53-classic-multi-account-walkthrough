<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="580" height="380" viewBox="0 0 580 380" fill="none" role="img" aria-label="Decision flow for VPC association authorization: same-account skips auth, cross-account requires authorization">
  <defs>
    <marker id="arrow-solid" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon class="arrow-head" points="0 0, 8 4, 0 8"/></marker>
    <marker id="arrow-dashed" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><polygon class="arrow-head-dashed" points="0 0, 8 4, 0 8"/></marker>
    <style>
  
  .diagram-frame { fill: #1e2836; stroke: #3d4f63; stroke-width: 1.5; }
  @media (prefers-color-scheme: light) {
    .diagram-frame { fill: #f8fafc; stroke: #c5cdd6; }
  }

  .panel { fill: #243040; stroke: #3d4f63; stroke-width: 1; }
  .panel.network { stroke: #7B68EE; stroke-opacity: 0.45; }
  .panel-title { fill: #f4f1f8; font-family: sans-serif; font-size: 13px; font-weight: 600; }
  .node { fill: #243040; stroke: #3d4f63; stroke-width: 1.5; }
  .node.accent, .node.ok { stroke: #7B68EE; }
  .node.auth { stroke: #64748b; stroke-dasharray: 4 3; }
  .node.fail { stroke: #e57373; }
  .node-label { fill: #f4f1f8; font-family: ui-monospace, monospace; font-size: 11px; font-weight: 500; }
  .node-label.small { font-size: 10px; }
  .detail, .edge-label { fill: #94a3b8; font-family: sans-serif; font-size: 10px; }
  .edge-label { font-size: 9px; }
  .link { stroke: #64748b; stroke-width: 1.5; fill: none; }
  .link.cross { stroke: #7B68EE; }
  .link.dashed { stroke: #94a3b8; stroke-dasharray: 5 4; }
  .arrow-head { fill: #7B68EE; }
  .arrow-head-dashed { fill: #94a3b8; }
  .diamond { fill: #243040; stroke: #7B68EE; stroke-width: 1.5; }
  .dir, .file { fill: #f4f1f8; font-family: ui-monospace, monospace; font-size: 12px; }
  .file { fill: #b8a9e8; }
  .comment { fill: #94a3b8; font-family: sans-serif; font-size: 11px; }
  .tree { stroke: #64748b; stroke-width: 1.5; fill: none; }
  @media (prefers-color-scheme: light) {
    .panel { fill: #eef1f5; stroke: #c5cdd6; }
    .panel.network { stroke: #6d5f95; }
    .panel-title, .node-label, .dir { fill: #1f2937; }
    .node { fill: #eef1f5; stroke: #c5cdd6; }
    .node.accent, .node.ok { stroke: #6d5f95; }
    .node.auth { stroke: #9ca3af; }
    .detail, .edge-label, .comment { fill: #4b5563; }
    .link { stroke: #9ca3af; }
    .link.cross { stroke: #6d5f95; }
    .link.dashed { stroke: #6b7280; }
    .arrow-head { fill: #6d5f95; }
    .arrow-head-dashed { fill: #6b7280; }
    .diamond { fill: #eef1f5; stroke: #6d5f95; }
    .file { fill: #5b4d8a; }
    .tree { stroke: #9ca3af; }
  }
</style>
  </defs>
  <rect class="diagram-frame" x="1" y="1" width="578" height="378" rx="10"/>
  
  <rect class="node" x="190" y="20" width="200" height="36" rx="6"/>
  <text class="node-label" x="290" y="42" text-anchor="middle">Associate VPC with PHZ</text>

  <path class="link cross" d="M 290 56 L 290 68" marker-end="url(#arrow-solid)"/>

  <polygon class="diamond" points="290,68 365,108 290,148 215,108"/>
  <text class="node-label" x="290" y="104" text-anchor="middle">Same account</text>
  <text class="node-label" x="290" y="118" text-anchor="middle">as zone owner?</text>

  <path class="link cross" d="M 215 108 L 80 108 L 80 198" marker-end="url(#arrow-solid)"/>
  <text class="edge-label" x="140" y="100" text-anchor="middle">Yes</text>

  <rect class="node ok" x="20" y="198" width="120" height="56" rx="6"/>
  <text class="node-label" x="80" y="220" text-anchor="middle">AssociateVPC</text>
  <text class="node-label" x="80" y="234" text-anchor="middle">WithHostedZone</text>
  <text class="detail" x="80" y="248" text-anchor="middle">no auth</text>

  <path class="link cross" d="M 365 108 L 450 108 L 450 158" marker-end="url(#arrow-solid)"/>
  <text class="edge-label" x="400" y="100" text-anchor="middle">No</text>

  <polygon class="diamond" points="450,158 545,213 450,268 355,213"/>
  <text class="node-label small" x="450" y="204" text-anchor="middle">Auth exists</text>
  <text class="node-label small" x="450" y="217" text-anchor="middle">for vpc_id +</text>
  <text class="node-label small" x="450" y="230" text-anchor="middle">region?</text>

  <path class="link cross" d="M 355 213 L 280 213 L 280 298" marker-end="url(#arrow-solid)"/>
  <text class="edge-label" x="310" y="205" text-anchor="middle">No</text>

  <rect class="node fail" x="220" y="298" width="120" height="40" rx="6"/>
  <text class="node-label" x="280" y="322" text-anchor="middle">AccessDenied</text>

  <path class="link cross" d="M 450 268 L 450 298" marker-end="url(#arrow-solid)"/>
  <text class="edge-label" x="462" y="286" text-anchor="start">Yes</text>

  <rect class="node ok" x="390" y="298" width="120" height="52" rx="6"/>
  <text class="node-label" x="450" y="320" text-anchor="middle">AssociateVPC</text>
  <text class="node-label" x="450" y="334" text-anchor="middle">in workload acct</text>

</svg>